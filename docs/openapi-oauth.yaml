openapi: 3.1.0
info:
  title: PCM OAuth2 API
  version: "2026-01-05"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: |
    OpenAPI definition for the PCM OAuth2 endpoints (token issuance and introspection).
    These endpoints are served at the PCM base URL (without /r4).
    PCM requires mTLS at the transport layer, but the client certificate is not
    the OAuth2 client authentication method. OAuth2 client authentication uses
    `private_key_jwt` with the assertion algorithms advertised by metadata.
    FHIR API access uses normal OAuth2 bearer tokens.
servers:
  - url: https://pcm.fhir.health.gov.il
    description: PCM OAuth2 base URL

tags:
  - name: OAuth2
    description: Token issuance and introspection.

paths:
  /.well-known/oauth-authorization-server:
    servers:
      - url: https://pcm.fhir.health.gov.il
    get:
      tags: [OAuth2]
      operationId: getOAuthAuthorizationServerMetadata
      summary: OAuth2 authorization server metadata
      description: |
        Returns OAuth2 authorization server metadata for the PCM issuer, including
        token, introspection, and JWKS endpoint locations.
      security: []
      responses:
        '200':
          description: OAuth2 authorization server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAuthorizationServerMetadata'
              examples:
                metadata:
                  value:
                    issuer: https://pcm.fhir.health.gov.il
                    token_endpoint: https://pcm.fhir.health.gov.il/token
                    introspection_endpoint: https://pcm.fhir.health.gov.il/introspect
                    jwks_uri: https://pcm.fhir.health.gov.il/.well-known/jwks.json
                    grant_types_supported:
                      - client_credentials
                    token_endpoint_auth_methods_supported:
                      - private_key_jwt
                    token_endpoint_auth_signing_alg_values_supported:
                      - ES384
                    introspection_endpoint_auth_methods_supported:
                      - private_key_jwt
                    introspection_endpoint_auth_signing_alg_values_supported:
                      - ES384
        '400':
          $ref: '#/components/responses/OAuthError'
  /.well-known/jwks.json:
    servers:
      - url: https://pcm.fhir.health.gov.il
    get:
      tags: [OAuth2]
      operationId: getJwks
      summary: PCM JSON Web Key Set
      description: Returns public JSON Web Keys associated with the PCM issuer.
      security: []
      responses:
        '200':
          description: JSON Web Key Set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonWebKeySet'
        '400':
          $ref: '#/components/responses/OAuthError'
  /token:
    servers:
      - url: https://pcm.fhir.health.gov.il
    post:
      tags: [OAuth2]
      operationId: issueAccessToken
      summary: Issue access token (client_credentials)
      description: |
        Issues an opaque access token using client_credentials OAuth2 flow.
        The endpoint requires mTLS as a transport-level policy, while OAuth2
        client authentication is performed with `private_key_jwt`.
        The issued token is associated with the registered OAuth client identity
        and the private key used to sign the client assertion. If the presented
        mTLS certificate differs from the JWT-signing certificate/key identity,
        the assertion should include `cnf` certificate evidence according to the
        configured PCM policy.
        For data source access, the client_assertion MUST include UDAP B2B extensions
        with a Consent reference (URL).
        PCM issues each access token for exactly one resource server. The token
        request MUST contain exactly one RFC 8707 `resource` parameter; requests
        containing more than one `resource` parameter fail with `invalid_target`.
        Clients request one token per resource server.
      security:
        - mtlsTransport: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
            examples:
              clientCredentials:
                summary: PCM management token request (RFC 8707 + private_key_jwt)
                value:
                  grant_type: client_credentials
                  client_assertion_type: urn:ietf:params:oauth:client-assertion-type:jwt-bearer
                  client_assertion: eyJhbGciOiJFUzM4NCIsInR5cCI6IkpXVCJ9..ExampleSignature
                  scope: system/*.cruds
                  resource: https://pcm.fhir.health.gov.il/r4
              dataSourceAccess:
                summary: Data source access token request (UDAP B2B + RFC 8707)
                value:
                  grant_type: client_credentials
                  client_assertion_type: urn:ietf:params:oauth:client-assertion-type:jwt-bearer
                  client_assertion: eyJhbGciOiJFUzM4NCIsInR5cCI6IkpXVCJ9..ExampleSignature
                  scope: patient/Observation.rs
                  resource: https://fhir.hmo-b.example.org/r4
              curlExample:
                summary: curl example (mTLS + form-encoded)
                description: >-
                  curl --cert sp-client.crt --key sp-client.key --cacert rootCA.crt
                  -X POST https://pcm.fhir.health.gov.il/token
                  -H "Content-Type: application/x-www-form-urlencoded"
                  --data-urlencode "grant_type=client_credentials"
                  --data-urlencode "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer"
                  --data-urlencode "client_assertion=<signed-jwt>"
                  --data-urlencode "scope=patient/Observation.rs"
                  --data-urlencode "resource=https://fhir.hmo-b.example.org/r4"
                value:
                  grant_type: client_credentials
                  client_assertion_type: urn:ietf:params:oauth:client-assertion-type:jwt-bearer
                  client_assertion: eyJ...
                  scope: patient/Observation.rs
                  resource: https://fhir.hmo-b.example.org/r4
      responses:
        '200':
          description: Access token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                managementTokenResponse:
                  summary: PCM management token (opaque)
                  value:
                    access_token: 2f1b8b7e-2d1a-4b0b-9e9a-9f02a7b3b6a1
                    token_type: Bearer
                    expires_in: 30
                    scope: system/*.cruds
                dataSourceTokenResponse:
                  summary: Data source access token (opaque)
                  value:
                    access_token: 8d3b1c9a-4f2a-4b9d-9b5a-6c1f4a7b2d11
                    token_type: Bearer
                    expires_in: 30
                    scope: patient/Observation.rs
        '400':
          $ref: '#/components/responses/OAuthError'
        '401':
          $ref: '#/components/responses/OAuthError'
  /introspect:
    servers:
      - url: https://pcm.fhir.health.gov.il
    post:
      tags: [OAuth2]
      operationId: introspectToken
      summary: Introspect access token
      description: |
        Validates an access token and returns its associated claims.
        Protected with transport-level mTLS. The introspecting client can
        authenticate either with an existing bearer token in the Authorization
        header or with `private_key_jwt` fields directly in the form body.
      security:
        - mtlsTransport: []
          bearerAuth: []
        - mtlsTransport: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IntrospectionRequest'
            examples:
              introspectionRequest:
                summary: Introspect opaque access token with bearer auth
                value:
                  token: 2f1b8b7e-2d1a-4b0b-9e9a-9f02a7b3b6a1
              privateKeyJwtIntrospection:
                summary: Introspect opaque access token with private_key_jwt
                value:
                  client_assertion_type: urn:ietf:params:oauth:client-assertion-type:jwt-bearer
                  client_assertion: eyJhbGciOiJFUzM4NCIsInR5cCI6IkpXVCIsImtpZCI6IjEifQ..ExampleSignature
                  token: 2f1b8b7e-2d1a-4b0b-9e9a-9f02a7b3b6a1
                  token_type_hint: access_token
      responses:
        '200':
          description: Introspection response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntrospectionResponse'
              examples:
                introspectionResponse:
                  summary: Active token with PCM context
                  value:
                    active: true
                    scope: system/*.cruds
                    client_id: http://pcm.fhir.health.gov.il/Organization/org-sp
                    organization_id: org-sp
                    patient: http://fhir.health.gov.il/identifier/il-national-id|000000018
                    fhirContext:
                      - type: Consent
                        identifier:
                          system: http://pcm.fhir.health.gov.il/identifier/pcm-consent-id
                          value: PCM-CONSENT-0001
                      - type: HealthcareService
                        identifier:
                          system: http://pcm.fhir.health.gov.il/identifier/pcm-healthcareservice-instance-id
                          value: PCM-HS-INST-0101
                    cnf:
                      x5t#S256: dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk
                    exp: 1706640030
                    iat: 1706640000
                    iss: http://pcm.fhir.health.gov.il/
                    aud: https://fhir.hmo-b.example.org/r4
                    sub: http://pcm.fhir.health.gov.il/Organization/org-sp
        '400':
          $ref: '#/components/responses/OAuthError'
        '401':
          $ref: '#/components/responses/OAuthError'

components:
  securitySchemes:
    mtlsTransport:
      type: mutualTLS
      description: >
        mTLS is required as a transport-level policy. The presented client
        certificate is not the OAuth2 client authentication method; OAuth2
        clients authenticate with private_key_jwt.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Opaque
      description: OAuth2 bearer token accepted for introspection caller authentication.
  schemas:
    OAuthAuthorizationServerMetadata:
      type: object
      required:
        - issuer
        - token_endpoint
        - introspection_endpoint
        - jwks_uri
        - grant_types_supported
        - token_endpoint_auth_methods_supported
        - token_endpoint_auth_signing_alg_values_supported
        - introspection_endpoint_auth_methods_supported
        - introspection_endpoint_auth_signing_alg_values_supported
      properties:
        issuer:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        introspection_endpoint:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri
        grant_types_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_signing_alg_values_supported:
          type: array
          items:
            type: string
        introspection_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        introspection_endpoint_auth_signing_alg_values_supported:
          type: array
          items:
            type: string
    JsonWebKeySet:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            type: object
            additionalProperties: true
    TokenRequest:
      type: object
      required:
        - grant_type
        - client_assertion_type
        - client_assertion
        - resource
      properties:
        grant_type:
          type: string
          enum: [client_credentials]
        client_assertion_type:
          type: string
          enum: [urn:ietf:params:oauth:client-assertion-type:jwt-bearer]
        client_assertion:
          type: string
          description: |
            Signed JWT (private_key_jwt) used for OAuth2 client authentication.
            It MUST be signed with a client key using one of the assertion
            algorithms advertised by metadata, and the production PCM profile
            expects ES384 unless the environment advertises and configures a
            different algorithm set.
            Required claims:
              - iss: Client ID (Organization URI)
              - sub: Client ID (same as iss)
              - aud: Token endpoint URL (https://pcm.fhir.health.gov.il/token)
              - jti: Unique identifier
              - iat/exp: Issued/expiration times (short-lived)
            If the mTLS certificate presented at the transport layer differs
            from the JWT-signing certificate/key identity, the assertion should
            include `cnf` certificate evidence such as `cnf.x5t#S256` according
            to configured PCM policy. This is evidentiary linkage only; it does
            not make mTLS the OAuth2 client authentication method.
            For data source access, the JWT MUST include UDAP B2B extensions:
              - extensions.hl7-b2b.organization_id
              - extensions.hl7-b2b.consent_reference (array of Consent URLs)
              - extensions.hl7-b2b.purpose_of_use (array, e.g. ["TREAT"])
        scope:
          type: string
          description: Requested scopes.
        resource:
          type: string
          description: RFC 8707 resource indicator (required). Exactly one resource parameter is allowed per token request. Use the PCM FHIR base URL for PCM management tokens, or the selected data source FHIR base URL for data source access tokens.
    TokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Signed token lifetime in seconds as configured by the PCM admin. Negative values indicate a token intentionally minted as already expired for testing.
        scope:
          type: string
    IntrospectionRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Token to introspect.
        token_type_hint:
          type: string
          description: Optional OAuth2 token type hint. `access_token` is accepted and ignored by the current implementation.
        client_assertion_type:
          type: string
          enum: [urn:ietf:params:oauth:client-assertion-type:jwt-bearer]
          description: Required when authenticating the introspection caller with private_key_jwt in the form body instead of bearer auth.
        client_assertion:
          type: string
          description: |
            Signed JWT (private_key_jwt) for introspection client authentication.
            The assertion algorithm MUST be one of the values advertised by
            `introspection_endpoint_auth_signing_alg_values_supported`.
            Required claims match token endpoint client authentication:
              - iss: Client ID
              - sub: Client ID (same as iss)
              - aud: Introspection endpoint URL. The token endpoint URL is also accepted for compatibility with clients that reuse their token-endpoint audience.
              - jti: Unique identifier
              - iat/exp: Issued/expiration times (short-lived)
    IntrospectionResponse:
      type: object
      properties:
        active:
          type: boolean
        scope:
          type: string
        client_id:
          type: string
        organization_id:
          type: string
        patient:
          type: string
        fhirContext:
          type: array
          description: Consent and HealthcareService instance context returned directly by introspection. Canonical catalog service details are not returned here; they can be discovered by reading/searching the instance HealthcareService and following its basedOn reference.
          items:
            type: object
        cnf:
          type: object
          description: Certificate confirmation/evidence associated with token issuance.
          properties:
            x5t#S256:
              type: string
              description: Base64url SHA-256 thumbprint of the certificate evidence.
        exp:
          type: integer
        iat:
          type: integer
        iss:
          type: string
        aud:
          type: string
          description: Audience/resource server for the token. For data-source access tokens this is the data source FHIR base URL supplied as the token request `resource`.
        sub:
          type: string
  responses:
    OAuthError:
      description: OAuth2 error response
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              error_description:
                type: string
          examples:
            invalidRequest:
              summary: Missing required parameter
              value:
                error: invalid_request
                error_description: Missing resource parameter (RFC 8707)
            invalidClient:
              summary: Invalid client assertion
              value:
                error: invalid_client
                error_description: Missing or invalid client_assertion
            invalidTarget:
              summary: Invalid resource target
              value:
                error: invalid_target
                error_description: PCM issues each access token for exactly one resource server; send one resource parameter
